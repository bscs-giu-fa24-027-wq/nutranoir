<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NutraNoir Admin Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      color: #fff;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── HEADER ────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
    }

    header h1 {
      color: #1a1a1a;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: #1a1a1a;
      color: #d4af37;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: #d4af37;
      color: #1a1a1a;
    }

    /* ── LOGIN SECTION ─────────────────────────────────────── */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 15px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-box h2 {
      color: #d4af37;
      margin-bottom: 30px;
      text-align: center;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #d4af37;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #d4af37;
      border-radius: 5px;
      color: #fff;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
      color: #1a1a1a;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
    }

    .error-msg {
      color: #ff6b6b;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
    }

    /* ── DASHBOARD ─────────────────────────────────────────── */
    .dashboard {
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(212, 175, 55, 0.1);
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .stat-card h3 {
      color: #d4af37;
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .stat-card .value {
      color: #fff;
      font-size: 32px;
      font-weight: bold;
    }

    /* ── FILTERS ───────────────────────────────────────────── */
    .filters {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .filter-group label {
      color: #d4af37;
      font-weight: 500;
      font-size: 14px;
    }

    .filter-group select,
    .filter-group input {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #d4af37;
      border-radius: 5px;
      color: #fff;
      font-size: 14px;
    }

    .filter-btn {
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      padding: 8px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    .filter-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
    }

    /* ── ORDERS TABLE ──────────────────────────────────────── */
    .orders-section {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table thead {
      background: rgba(212, 175, 55, 0.2);
      border-bottom: 2px solid #d4af37;
    }

    table th {
      padding: 15px;
      text-align: left;
      color: #d4af37;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 12px;
    }

    table td {
      padding: 15px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      font-size: 14px;
    }

    table tr:hover {
      background: rgba(212, 175, 55, 0.1);
    }

    .status-badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-pending {
      background: #ff9800;
      color: #fff;
    }

    .status-confirmed {
      background: #4caf50;
      color: #fff;
    }

    .status-shipped {
      background: #2196f3;
      color: #fff;
    }

    .status-delivered {
      background: #9c27b0;
      color: #fff;
    }

    .status-cancelled {
      background: #f44336;
      color: #fff;
    }

    .action-btn {
      background: #d4af37;
      color: #1a1a1a;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      transition: all 0.3s ease;
      margin-right: 5px;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
    }

    .action-btn.secondary {
      background: transparent;
      border: 1px solid #d4af37;
      color: #d4af37;
    }

    /* ── MODAL ─────────────────────────────────────────────── */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      border: 1px solid #d4af37;
      border-radius: 10px;
      padding: 30px;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      padding-bottom: 15px;
    }

    .modal-header h2 {
      color: #d4af37;
      margin: 0;
    }

    .close-modal {
      background: none;
      border: none;
      color: #d4af37;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      transform: rotate(90deg);
    }

    .modal-body {
      color: #fff;
    }

    .modal-body p {
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .modal-body strong {
      color: #d4af37;
    }

    .modal-footer {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
      padding-top: 15px;
    }

    .update-status-form {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .update-status-form select {
      width: 100%;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #d4af37;
      border-radius: 5px;
      color: #fff;
      margin-bottom: 10px;
    }

    .loading {
      text-align: center;
      color: #d4af37;
      font-size: 18px;
    }

    .no-orders {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    @media (max-width: 768px) {
      .filters {
        flex-direction: column;
      }

      .filter-group {
        width: 100%;
      }

      table {
        font-size: 12px;
      }

      table th,
      table td {
        padding: 10px;
      }

      .action-btn {
        padding: 6px 10px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-container">
      <div class="login-box">
        <h2>🍫 NutraNoir Admin</h2>
        <form id="loginForm">
          <div class="form-group">
            <label for="email">Admin Email</label>
            <input type="email" id="email" placeholder="admin@nutranoir.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="login-btn">Login</button>
          <div id="loginError" class="error-msg"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <div class="container">
      <header>
        <h1>🍫 NutraNoir Admin Dashboard</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </header>

      <!-- STATS -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <h3>Total Orders</h3>
          <div class="value" id="totalOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Pending Orders</h3>
          <div class="value" id="pendingOrders">0</div>
        </div>
        <div class="stat-card">
          <h3>Total Revenue</h3>
          <div class="value" id="totalRevenue">Rs. 0</div>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filters">
        <div class="filter-group">
          <label>Filter by Status:</label>
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <button class="filter-btn" onclick="loadOrders()">Apply Filters</button>
        <button class="filter-btn secondary" onclick="refreshDashboard()">Refresh</button>
      </div>

      <!-- ORDERS TABLE -->
      <div class="orders-section">
        <div id="ordersTable"></div>
      </div>
    </div>
  </div>

  <!-- ORDER DETAIL MODAL -->
  <div class="modal" id="orderModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalOrderRef">Order Details</h2>
        <button class="close-modal" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="action-btn secondary" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api';
    let authToken = localStorage.getItem('adminToken');
    let currentOrders = [];

    // ── INIT ────────────────────────────────────────────────
    window.addEventListener('load', () => {
      if (authToken) {
        showDashboard();
        loadDashboard();
      } else {
        showLogin();
      }
    });

    // ── LOGIN ───────────────────────────────────────────────
    document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch(`${API_BASE}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        authToken = data.token;
        localStorage.setItem('adminToken', authToken);
        showDashboard();
        loadDashboard();
      } catch (error) {
        document.getElementById('loginError').textContent = '❌ ' + error.message;
      }
    });

    // ── LOGOUT ──────────────────────────────────────────────
    function logout() {
      authToken = null;
      localStorage.removeItem('adminToken');
      showLogin();
      document.getElementById('loginForm').reset();
    }

    // ── SHOW/HIDE ───────────────────────────────────────────
    function showLogin() {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    }

    // ── LOAD DASHBOARD ──────────────────────────────────────
    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/admin/stats/dashboard`, {
          headers: { 'Authorization': `Bearer ${authToken}` },
        });

        if (!response.ok) throw new Error('Failed to load stats');

        const stats = await response.json();
        document.getElementById('totalOrders').textContent = stats.totalOrders;
        document.getElementById('pendingOrders').textContent = stats.pendingOrders;
        document.getElementById('totalRevenue').textContent = 'Rs. ' + parseFloat(stats.totalRevenue).toLocaleString('en-PK', { minimumFractionDigits: 2 });

        await loadOrders();
      } catch (error) {
        alert('Error loading dashboard: ' + error.message);
      }
    }

    // ── LOAD ORDERS ────────────────────────────────────────
    async function loadOrders() {
      try {
        document.getElementById('ordersTable').innerHTML = '<div class="loading">📦 Loading orders...</div>';

        const response = await fetch(`${API_BASE}/admin/orders`, {
          headers: { 'Authorization': `Bearer ${authToken}` },
        });

        if (!response.ok) throw new Error('Failed to load orders');

        let orders = await response.json();
        const statusFilter = document.getElementById('statusFilter').value;

        if (statusFilter) {
          orders = orders.filter(o => o.status === statusFilter);
        }

        currentOrders = orders;

        if (orders.length === 0) {
          document.getElementById('ordersTable').innerHTML = '<div class="no-orders">No orders found.</div>';
          return;
        }

        let html = `
          <table>
            <thead>
              <tr>
                <th>Order Reference</th>
                <th>Customer</th>
                <th>Total</th>
                <th>Status</th>
                <th>Payment</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
        `;

        orders.forEach(order => {
          const date = new Date(order.created_at).toLocaleDateString('en-PK');
          html += `
            <tr>
              <td><strong>${order.order_ref}</strong></td>
              <td>${order.users?.name || 'N/A'}</td>
              <td>Rs. ${parseFloat(order.total_amount).toFixed(2)}</td>
              <td><span class="status-badge status-${order.status}">${order.status}</span></td>
              <td><span class="status-badge status-${order.payment_status}">${order.payment_status}</span></td>
              <td>${date}</td>
              <td>
                <button class="action-btn" onclick="viewOrder('${order.id}')">View</button>
              </td>
            </tr>
          `;
        });

        html += '</tbody></table>';
        document.getElementById('ordersTable').innerHTML = html;
      } catch (error) {
        alert('Error loading orders: ' + error.message);
      }
    }

    // ── VIEW ORDER DETAIL ───────────────────────────────────
    async function viewOrder(orderId) {
      try {
        const response = await fetch(`${API_BASE}/admin/orders/${orderId}`, {
          headers: { 'Authorization': `Bearer ${authToken}` },
        });

        if (!response.ok) throw new Error('Failed to load order');

        const order = await response.json();

        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `<p>• ${item.name} x${item.qty} = Rs. ${(item.price * item.qty).toFixed(2)}</p>`;
        });

        const modalBody = document.getElementById('modalBody');
        modalBody.innerHTML = `
          <div>
            <p><strong>Order Reference:</strong> ${order.order_ref}</p>
            <p><strong>Customer:</strong> ${order.users?.name}</p>
            <p><strong>Email:</strong> ${order.users?.email}</p>
            <p><strong>Phone:</strong> ${order.users?.phone}</p>
            <p><strong>Status:</strong> <span class="status-badge status-${order.status}">${order.status}</span></p>
            <p><strong>Payment Status:</strong> <span class="status-badge status-${order.payment_status}">${order.payment_status}</span></p>
            <p><strong>Total Amount:</strong> Rs. ${parseFloat(order.total_amount).toFixed(2)}</p>
            <p><strong>Date:</strong> ${new Date(order.created_at).toLocaleString('en-PK')}</p>

            <h3 style="margin-top: 20px; color: #d4af37;">Items</h3>
            ${itemsHtml}

            <h3 style="margin-top: 20px; color: #d4af37;">Shipping Address</h3>
            <p>
              ${order.shipping_address.name}<br>
              ${order.shipping_address.address}<br>
              ${order.shipping_address.city}, ${order.shipping_address.postal_code}
            </p>

            <div class="update-status-form">
              <label style="color: #d4af37; display: block; margin-bottom: 10px;"><strong>Update Status</strong></label>
              <select id="newStatus" onchange="updateOrderStatus('${orderId}')">
                <option value="">Select new status</option>
                <option value="confirmed">Confirmed</option>
                <option value="shipped">Shipped</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
          </div>
        `;

        document.getElementById('modalOrderRef').textContent = 'Order ' + order.order_ref;
        document.getElementById('orderModal').classList.add('active');
      } catch (error) {
        alert('Error loading order: ' + error.message);
      }
    }

    // ── UPDATE ORDER STATUS ────────────────────────────────
    async function updateOrderStatus(orderId) {
      const newStatus = document.getElementById('newStatus').value;
      if (!newStatus) return;

      try {
        const response = await fetch(`${API_BASE}/admin/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: {
            'Authorization': `Bearer ${authToken}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ status: newStatus }),
        });

        if (!response.ok) throw new Error('Failed to update status');

        alert('✅ Order status updated successfully!');
        closeModal();
        loadOrders();
        loadDashboard();
      } catch (error) {
        alert('Error updating status: ' + error.message);
      }
    }

    // ── REFRESH ────────────────────────────────────────────
    function refreshDashboard() {
      loadDashboard();
    }

    // ── MODAL CONTROL ──────────────────────────────────────
    function closeModal() {
      document.getElementById('orderModal').classList.remove('active');
    }

    window.onclick = function (event) {
      const modal = document.getElementById('orderModal');
      if (event.target === modal) {
        modal.classList.remove('active');
      }
    };
  </script>
</body>
</html>
